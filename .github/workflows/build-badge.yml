name: Build badge firmware

on:
  push:
    branches:
      - master
    tags:
      - v*
  workflow_dispatch:

concurrency:
  group: badge-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        run: pio run -e shipwrecked

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shipwrecked
          path: .pio/build/shipwrecked/*.uf2

      - name: Create release and upload
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'continuous' }}
          body: ${{ startsWith(github.ref, 'refs/tags/') && 'See changelog' || 'Automated build from latest commit.' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: .pio/build/shipwrecked/firmware.uf2
